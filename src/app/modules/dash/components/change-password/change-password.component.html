<div class="modal-header">
    <h4 class="modal-title">Change Password</h4>
    <button type="button" class="btn-close" aria-label="Close" (click)="activeModal.dismiss()"></button>
</div>
<div class="modal-body">
    <form [formGroup]="changePasswordForm" (ngSubmit)="onSubmit()">
        <!-- Old Password -->
        <div class="mb-3">
            <label for="old_password" class="form-label">Current Password <span class="text-danger">*</span></label>
            <div class="input-group">
                <input [type]="showOldPassword ? 'text' : 'password'" class="form-control" id="old_password"
                    formControlName="old_password" placeholder="Enter current password"
                    [class.is-invalid]="oldPassword?.invalid && oldPassword?.touched">
                <button class="btn btn-outline-secondary" type="button" (click)="togglePasswordVisibility('old')">
                    <i class="fe" [ngClass]="showOldPassword ? 'fe-eye-off' : 'fe-eye'"></i>
                </button>
            </div>
            <div class="invalid-feedback d-block" *ngIf="oldPassword?.invalid && oldPassword?.touched">
                <span *ngIf="oldPassword?.errors?.['required']">Current password is required</span>
            </div>
        </div>

        <!-- New Password -->
        <div class="mb-3">
            <label for="new_password" class="form-label">New Password <span class="text-danger">*</span></label>
            <div class="input-group">
                <input [type]="showNewPassword ? 'text' : 'password'" class="form-control" id="new_password"
                    formControlName="new_password" placeholder="Enter new password"
                    [class.is-invalid]="newPassword?.invalid && newPassword?.touched">
                <button class="btn btn-outline-secondary" type="button" (click)="togglePasswordVisibility('new')">
                    <i class="fe" [ngClass]="showNewPassword ? 'fe-eye-off' : 'fe-eye'"></i>
                </button>
            </div>
            <div class="invalid-feedback d-block" *ngIf="newPassword?.invalid && newPassword?.touched">
                <span *ngIf="newPassword?.errors?.['required']">New password is required</span>
                <span *ngIf="newPassword?.errors?.['minlength']">Password must be at least 6 characters</span>
            </div>
        </div>

        <!-- Confirm Password -->
        <div class="mb-3">
            <label for="confirm_password" class="form-label">Confirm New Password <span
                    class="text-danger">*</span></label>
            <div class="input-group">
                <input [type]="showConfirmPassword ? 'text' : 'password'" class="form-control" id="confirm_password"
                    formControlName="confirm_password" placeholder="Confirm new password"
                    [class.is-invalid]="confirmPassword?.invalid && confirmPassword?.touched">
                <button class="btn btn-outline-secondary" type="button" (click)="togglePasswordVisibility('confirm')">
                    <i class="fe" [ngClass]="showConfirmPassword ? 'fe-eye-off' : 'fe-eye'"></i>
                </button>
            </div>
            <div class="invalid-feedback d-block" *ngIf="confirmPassword?.invalid && confirmPassword?.touched">
                <span *ngIf="confirmPassword?.errors?.['required']">Confirm password is required</span>
                <span *ngIf="confirmPassword?.errors?.['passwordMismatch']">Passwords do not match</span>
            </div>
        </div>
    </form>
</div>
<div class="modal-footer p-3">
    <button type="button" class="btn btn-sm btn-light rounded-1" (click)="activeModal.dismiss()" [disabled]="isLoading">
        <i class="fe fe-x me-2"></i>
        <span>Cancel</span>
    </button>
    <button type="button" class="btn btn-sm btn-primary rounded-1" (click)="onSubmit()"
        [disabled]="isLoading || changePasswordForm.invalid">
        <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
        <i *ngIf="!isLoading" class="fe fe-check me-2"></i>
        <span>{{ isLoading ? 'Changing...' : 'Change Password' }}</span>
    </button>
</div>
