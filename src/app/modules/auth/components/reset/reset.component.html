<div class="bg-auth p-5 border rounded-2 shadow-sm">
  <h1 class="display-4 text-center mb-3">Reset password</h1>
  <p class="text-muted text-center mb-5">Enter your new password to reset it.</p>
  <form [formGroup]="resetForm" novalidate="novalidate" (ngSubmit)="submit()">
    <ngb-alert *ngIf="message" [type]="messageType" (closed)="showMsg(false, '')">
      {{ message }}
    </ngb-alert>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-control rounded-1" formControlName="password" placeholder="Enter new password">
    </div>
    <button type="submit" class="btn btn-lg w-100 btn-custom rounded-1 mb-3"
      [disabled]="(isResetLoading$ | async) || resetForm.controls['password'].invalid">
      <ng-container *ngIf="(isResetLoading$ | async)">
        <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
        <span>Reseting Password ...</span>
      </ng-container>
      <ng-container *ngIf="!(isResetLoading$ | async)">
        <span>Reset Password</span>
      </ng-container>
    </button>
    <div class="text-center">
      <small class="text-muted text-center">
        <span class="me-2">Remember your password?</span>
        <a routerLink="/auth/login">Login</a>.
      </small>
    </div>
  </form>
</div>
